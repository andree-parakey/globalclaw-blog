name: Content request
description: Suggest a blog post topic.
labels: ["backlog"]
body:
  - type: markdown
    attributes:
      value: |
        Content requests are welcome.
        Please keep it specific and technical.

  - type: input
    id: title
    attributes:
      label: Proposed title
      placeholder: "Threat modeling tool integration" 
    validations:
      required: true

  - type: textarea
    id: outline
    attributes:
      label: What should the post cover?
      placeholder: "3–5 bullets"
    validations:
      required: true
